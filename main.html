<script>
  
const GEMINI_API_KEY = "AIzaSyAm6_8aFG2-INkRGW0xCutrhKa46CTG_hU";  

const form = document.getElementById("askForm");
const chatBox = document.getElementById("chatBox");
const attachmentInput = document.getElementById("attachment");
const fileInfo = document.getElementById("fileInfo");
const fileNameSpan = document.getElementById("fileName");
const removeFileIcon = document.getElementById("removeFile");
const questionInput = document.getElementById("question");

// Auto resize + Enter submit
questionInput.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event("submit"));
  }
});
questionInput.addEventListener("input", function () {
  this.style.height = "auto";

  const maxHeight = 160; // must match CSS
  if (this.scrollHeight <= maxHeight) {
    this.style.height = this.scrollHeight + "px";
    this.style.overflowY = "hidden";
  } else {
    this.style.height = maxHeight + "px";
    this.style.overflowY = "auto";
  }
});


// File logic
attachmentInput.addEventListener("change", () => {
  if (attachmentInput.files.length > 0) {
    fileNameSpan.textContent = attachmentInput.files[0].name;
    fileInfo.style.display = "flex";
  } else fileInfo.style.display = "none";
});

removeFileIcon.addEventListener("click", () => {
  attachmentInput.value = "";
  fileInfo.style.display = "none";
});

// Convert file → Base64
function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

let currentMode = "text";

const textModeBtn = document.getElementById("textMode");
const imageModeBtn = document.getElementById("imageMode");

textModeBtn.onclick = () => {
  currentMode = "text";
  textModeBtn.classList.add("active");
  imageModeBtn.classList.remove("active");
};

imageModeBtn.onclick = () => {
  currentMode = "image";
  imageModeBtn.classList.add("active");
  textModeBtn.classList.remove("active");
};


// MAIN SUBMIT HANDLER
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const question = questionInput.value.trim();
  const file = attachmentInput.files[0];

  if (!question && !file) {
    alert("Please enter a question or attach a PDF file.");
    return;
  }

  // USER MESSAGE
  if (question) {
    const userBubble = document.createElement("div");
    userBubble.className = "chat-bubble user-bubble align-self-end";
    userBubble.textContent = question;
    chatBox.appendChild(userBubble);
  }

  // AI LOADING
  const aiBubble = document.createElement("div");
  aiBubble.className = "chat-bubble ai-bubble align-self-start";
  aiBubble.textContent = "AI is thinking...";
  chatBox.appendChild(aiBubble);
  chatBox.scrollTop = chatBox.scrollHeight;

  // IMAGE MODE
  if (currentMode === "image") {
    try {
      const res = await fetch("http://127.0.0.1:5000/ask-image", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ prompt: question })
      });

      const data = await res.json();

      if (!data.success) {
        aiBubble.textContent = "❌ " + data.error;
        return;
      }

      aiBubble.innerHTML = `<img src="${data.image}" style="max-width:100%;border-radius:12px;">`;

    } catch (err) {
      aiBubble.textContent = "❌ Image generation failed.";
      console.error(err);
    }

    questionInput.value = "";
    return;
  }

  // TEXT MODE
  try {
    let contents = [
      { role: "user", parts: [{ text: question || "" }] }
    ];

    if (file) {
      const base64Data = await toBase64(file);
      contents.push({
        role: "user",
        parts: [{
          inline_data: {
            mime_type: "application/pdf",
            data: base64Data
          }
        }]
      });
    }

    const response = await fetch("http://127.0.0.1:5000/ask", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ contents })
    });

    if (!response.ok) {
      throw new Error("Server error: " + response.status);
    }

    const data = await response.json();
    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

    aiBubble.textContent = "";

    // CONTENT
    const contentDiv = document.createElement("div");
    contentDiv.className = "ai-content";
    contentDiv.innerHTML = marked.parse(aiText);
    aiBubble.appendChild(contentDiv);

    // CODE HIGHLIGHT
    contentDiv.querySelectorAll("pre code").forEach(block => {
      hljs.highlightElement(block);
    });

    // 🔥 BUTTONS
    const header = document.createElement("div");
    header.className = "d-flex justify-content-end gap-2 mb-2";

    // COPY
    const copyBtn = document.createElement("button");
    copyBtn.className = "btn btn-sm btn-outline-light";
    copyBtn.textContent = "📋 Copy";
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(aiText);
      copyBtn.textContent = "✔ Copied";
      setTimeout(() => copyBtn.textContent = "📋 Copy", 2000);
    };

    // PDF
    const pdfBtn = document.createElement("button");
    pdfBtn.className = "btn btn-sm btn-outline-light";
    pdfBtn.textContent = "📄 PDF";
    pdfBtn.onclick = () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const text = contentDiv.innerText;
      const lines = doc.splitTextToSize(text, 180);

      let y = 10;
      lines.forEach(line => {
        if (y > 280) {
          doc.addPage();
          y = 10;
        }
        doc.text(line, 10, y);
        y += 7;
      });

      doc.save("AI_Response.pdf");
    };

    // SPEAK
    const speakBtn = document.createElement("button");
    speakBtn.className = "btn btn-sm btn-outline-light";
    speakBtn.innerHTML = "🔊 Speak";

    speakBtn.onclick = () => {
      if (speechSynthesis.speaking) {
        speechSynthesis.cancel();
        speakBtn.innerHTML = "🔊 Speak";
        return;
      }

      const utter = new SpeechSynthesisUtterance(aiText);
      speechSynthesis.speak(utter);
      speakBtn.innerHTML = "⏹ Stop";

      utter.onend = () => {
        speakBtn.innerHTML = "🔊 Speak";
      };
    };

    header.appendChild(copyBtn);
    header.appendChild(pdfBtn);
    header.appendChild(speakBtn);

    aiBubble.prepend(header);

    // SAVE CHAT
    if (question) {
      saveChat(question, chatBox.innerHTML);
    }

  } catch (error) {
    console.error("ERROR:", error);
    aiBubble.textContent = "❌ Something went wrong. Check console.";
  }

  // RESET
  questionInput.value = "";
  attachmentInput.value = "";
  fileInfo.style.display = "none";
  questionInput.style.height = "auto";
});
</script>
<script>
/* ===== SPEECH TO TEXT ===== */

const micBtn = document.getElementById("micBtn");

let recognition;
let listening = false;

if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onstart = () => {
    listening = true;
    micBtn.classList.add("mic-active");
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove("mic-active");

    // Auto-submit after speaking
    if (questionInput.value.trim() !== "") {
      form.dispatchEvent(new Event("submit"));
    }
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    questionInput.value = transcript;
    questionInput.dispatchEvent(new Event("input"));
  };

  recognition.onerror = (event) => {
    console.error("Speech error:", event.error);
    micBtn.classList.remove("mic-active");
  };

  micBtn.addEventListener("click", () => {
    if (!listening) recognition.start();
    else recognition.stop();
  });

} else {
  micBtn.style.display = "none";
  console.warn("Speech recognition not supported");
}
</script>

<script>
/* ===== CHAT HISTORY LOGIC (WITH DELETE) ===== */

/* ===== CHAT HISTORY SYSTEM ===== */

function loadChatHistory() {
  const history = JSON.parse(localStorage.getItem("chatHistory")) || [];
  const chatHistoryDiv = document.getElementById("chatHistory");
  chatHistoryDiv.innerHTML = "";

  history.forEach((chat, index) => {

    const item = document.createElement("div");
    item.className = "chat-history-item d-flex justify-content-between align-items-center";

    const title = document.createElement("span");
    title.textContent = chat.question.length > 30
      ? chat.question.substring(0, 30) + "..."
      : chat.question;

    title.style.cursor = "pointer";

    // Load chat using URL
    title.onclick = () => {
      window.location.href = `${window.location.pathname}?chatId=${chat.id}`;
    };

    // Delete button
    const delBtn = document.createElement("i");
    delBtn.className = "bi bi-trash text-danger ms-2";
    delBtn.style.cursor = "pointer";

    delBtn.onclick = (e) => {
      e.stopPropagation();
      deleteChat(index);
    };

    item.appendChild(title);
    item.appendChild(delBtn);
    chatHistoryDiv.appendChild(item);
  });
}


function saveChat(question, chatHTML) {
  const history = JSON.parse(localStorage.getItem("chatHistory")) || [];

  const chatId =
    new URLSearchParams(window.location.search).get("chatId") ||
    Date.now();

  const existingIndex = history.findIndex(chat => chat.id == chatId);

  const chatData = {
    id: chatId,
    question: question,
    content: chatHTML
  };

  if (existingIndex !== -1) {
    history[existingIndex] = chatData;
  } else {
    history.unshift(chatData);
  }

  localStorage.setItem("chatHistory", JSON.stringify(history));
  loadChatHistory();
}


function loadChatFromURL() {
  const chatId = new URLSearchParams(window.location.search).get("chatId");
  const history = JSON.parse(localStorage.getItem("chatHistory")) || [];

  if (!chatId) return;

  const chat = history.find(c => c.id == chatId);

  if (chat) {
    chatBox.innerHTML = chat.content;

    // 🔥 Reattach button functionality
    rebindButtons();
  }
}
function rebindButtons() {

  // COPY BUTTONS
  document.querySelectorAll(".btn-outline-light").forEach(btn => {

    if (btn.textContent.includes("Copy")) {
      btn.onclick = function () {
        const text = this.closest(".chat-bubble").innerText;
        navigator.clipboard.writeText(text);
        this.textContent = "✔ Copied";
        setTimeout(() => (this.textContent = "📋 Copy"), 2000);
      };
    }

    if (btn.textContent.includes("PDF")) {
  btn.onclick = function () {

    const text = this.closest(".chat-bubble").innerText;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const margin = 15;
    const pageWidth = doc.internal.pageSize.getWidth() - margin * 2;
    const pageHeight = doc.internal.pageSize.getHeight();

    const lines = doc.splitTextToSize(text, pageWidth);

    let cursorY = margin;

    lines.forEach(line => {
      if (cursorY > pageHeight - margin) {
        doc.addPage();
        cursorY = margin;
      }
      doc.text(line, margin, cursorY);
      cursorY += 7; // line spacing
    });

    doc.save("AI_Response.pdf");
  };
}

    if (btn.textContent.includes("Speak")) {
      btn.onclick = function () {
        const text = this.closest(".chat-bubble").innerText;

        if (speechSynthesis.speaking) {
          speechSynthesis.cancel();
          this.innerHTML = "🔊 Speak";
          return;
        }

        const utterance = new SpeechSynthesisUtterance(text);
        speechSynthesis.speak(utterance);
        this.innerHTML = "⏹ Stop";
      };
    }

  });

}


function deleteChat(index) {
  const history = JSON.parse(localStorage.getItem("chatHistory")) || [];
  history.splice(index, 1);
  localStorage.setItem("chatHistory", JSON.stringify(history));
  loadChatHistory();
  chatBox.innerHTML = "";
}


// NEW CHAT BUTTON
document.getElementById("newChatBtn").addEventListener("click", () => {

  const lastUserBubble = chatBox.querySelector(".user-bubble");

  if (chatBox.innerHTML.trim() !== "" && lastUserBubble) {
    saveChat(lastUserBubble.textContent, chatBox.innerHTML);
  }

  const newChatId = Date.now();

  // IMPORTANT: Use current page
  window.location.href = `${window.location.pathname}?chatId=${newChatId}`;
});


// Load on page start
loadChatHistory();
loadChatFromURL();
</script>
<script>
  /* ===== THEME TOGGLE ===== */

const themeToggle = document.getElementById("themeToggle");

// Load saved theme
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "light") {
  document.body.classList.add("light-mode");
}

themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("light-mode");

  if (document.body.classList.contains("light-mode")) {
    localStorage.setItem("theme", "light");
  } else {
    localStorage.setItem("theme", "dark");
  }
});
</script>
<script>
  const menuToggle = document.getElementById("menuToggle");
const sidebar = document.querySelector(".chat-sidebar");

if (menuToggle) {
  menuToggle.addEventListener("click", () => {
    sidebar.classList.toggle("active");
  });
}
/* Close sidebar when clicking outside (mobile UX) */
document.addEventListener("click", (e) => {
  if (
    window.innerWidth <= 992 &&
    !sidebar.contains(e.target) &&
    !menuToggle.contains(e.target)
  ) {
    sidebar.classList.remove("active");
  }
});
</script>
