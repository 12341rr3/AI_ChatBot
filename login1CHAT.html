<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Static Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background-image: url("https://images.unsplash.com/photo-1535223289827-42f1e9919769");
      background-size: cover;
      background-position: center;
    }
.login-card label {
  color: white;
}
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      z-index: 1;
    }

    .login-card {
      position: relative;
      width: 420px;
      padding: 35px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0px 10px 35px rgba(0,0,0,0.4);
      z-index: 10;
    }

    h3 { color: white; font-weight: 700; }
    .form-label { color: #e2e2e2; }

    .form-control {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
    }

    .form-control::placeholder {
      color: #ddd;
    }

    .btn-custom {
      background: linear-gradient(45deg, #6a80f5, #9b57d3);
      border: none;
      color: white;
      font-weight: 600;
    }

    #errorMsg {
      color: #ff4d4d;
      font-weight: bold;
    }
  </style>

</head>

<body>

  <div class="login-card text-center">
    <h3 class="mb-4">Login</h3>

    <form id="loginForm">

      <div class="mb-3 text-start">
        <label style="text-decoration: #000;">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required>
      </div>

      <div class="mb-3 text-start">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-custom w-100">Login</button>

    </form>

    <p id="errorMsg" class="mt-3 d-none"></p>
  </div>

  <!-- 🔥 STATIC LOGIN SCRIPT -->
  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");

    // 🔐 Hardcoded credentials
    const validUsername = "admin";
    const validPassword = "1234";

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username === validUsername && password === validPassword) {

        // Save login
        localStorage.setItem("user", JSON.stringify({
          name: username
        }));

        // Redirect
        window.location.href = "main.html";

      } else {
        errorMsg.classList.remove("d-none");
        errorMsg.textContent = "❌ Invalid username or password!";
      }
    });
  </script>

</body>
</html>
