<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://bs-uploads.toptal.io/blackfish-uploads/components/blog_post_page/4088234/cover_image/retina_1708x683/cover-chatbot-ux-design-2f98727c40ba679ed014d2162fc0bffe.png') 
                  no-repeat center center/cover;
      background-attachment: fixed;
    }

    .register-card {
      width: 420px;
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      color: #fff;
    }

    .form-control {
      background: rgba(255,255,255,0.7);
      border: none;
      border-radius: 10px;
      height: 45px;
    }

    .input-group-text {
      background: rgba(255,255,255,0.8);
      border: none;
    }

    .btn-custom {
      background: #28a745;
      color: white;
      border-radius: 10px;
      height: 45px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  
  <div class="register-card">
    <h3 class="text-center mb-4">Create Account</h3>

    <!-- CONNECTS TO PYTHON BACKEND -->
   <form action="/register" method="POST">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-user"></i></span>
          <input type="text" class="form-control" name="username" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-lock"></i></span>
          <input type="password" class="form-control" name="password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-custom w-100">Register</button>
    </form>
    <div class="text-center mt-3">
  <span style="color:#eee;">Already have an account?</span>
  <a href="/login" style="color:#fff; font-weight:600; text-decoration:none;">
    Login
  </a>
</div>

  </div>

</body>
</html>
